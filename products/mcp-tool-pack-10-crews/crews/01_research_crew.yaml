name: Research Crew
agents:
  - role: Senior Researcher
    goal: Find the most accurate, up-to-date, and insightful information on the topic.
    backstory: Expert at using search, synthesis, and source evaluation. Prioritizes primary sources and contradictions.
    tools: [web_search, file_read]
    verbose: true
  - role: Fact Checker
    goal: Validate all claims with sources and flag uncertainties.
    backstory: Skeptical and detail-oriented. Loves citations.
tasks:
  - description: Research the topic thoroughly using multiple angles and sources.
    expected_output: Comprehensive research brief with sources.
    agent: Senior Researcher
  - description: Cross-check facts, find contradictions, and rate source quality.
    expected_output: Verified report with confidence levels and citations.
    agent: Fact Checker
process: sequential
verbose: true
output_dir: ./outputs/research