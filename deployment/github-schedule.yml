# .github/workflows/agentforge-autonomy.yml
# Schedule daily autonomous product generation + publish

name: AgentForge Daily Autonomy

on:
  schedule:
    - cron: '0 9 * * *'   # 9am UTC daily
  workflow_dispatch:      # manual trigger

jobs:
  run-autonomy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install -r requirements.txt

      - name: Run autonomous cycles
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: |
          python autonomy_runner.py --cycles 2 --publish

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-log
          path: agentforge.log